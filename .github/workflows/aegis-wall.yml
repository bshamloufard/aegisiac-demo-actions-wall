name: aegis-actions-wall

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read
  issues: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  plan-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Redact Terraform plan
        run: |
          jq 'del(.. | .before_sensitive?, .after_sensitive?, .sensitive_values?)' aegis/plan.json > aegis/plan.redacted.json

      - name: Run AegisIaC demo gate
        run: node aegis/scan.mjs

      - name: Enforce Aegis approval label
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          labels="$(gh pr view "$PR_NUMBER" --repo "$REPO" --json labels --jq '.labels[].name')"
          if echo "$labels" | grep -qx "aegis-approved"; then
            echo "Aegis approval found. Unblocking merge gate." >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo ""
              echo "## Approval required"
              echo ""
              echo "This PR is intentionally blocked until AegisIaC applies the \`aegis-approved\` approval."
              echo ""
              echo "Review the architecture page, then run the approve workflow with PR number \`$PR_NUMBER\`."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

      - name: Upload review artifacts
        uses: actions/upload-artifact@v4
        with:
          name: aegis-plan-review
          path: |
            aegis/plan.redacted.json
            aegis/report.json

  deploy-wall:
    needs: plan-review
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Redact Terraform plan
        run: |
          jq 'del(.. | .before_sensitive?, .after_sensitive?, .sensitive_values?)' aegis/plan.json > aegis/plan.redacted.json
      - name: Generate static report
        run: node aegis/scan.mjs
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
