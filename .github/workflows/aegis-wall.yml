name: aegis-actions-wall

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read
  issues: write
  statuses: write
  pages: write
  id-token: write

env:
  ISENGARD_REVIEW_URL: https://isengard-environment-ui-production.up.railway.app/

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  plan-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Redact Terraform plan
        run: |
          jq 'del(.. | .before_sensitive?, .after_sensitive?, .sensitive_values?)' aegis/plan.json > aegis/plan.redacted.json

      - name: Run AegisIaC demo gate
        run: node aegis/scan.mjs

      - name: Publish Isengard PR trace
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          marker="<!-- isengard-review-link -->"
          encoded_repo="$(jq -rn --arg value "$GITHUB_REPOSITORY" '$value | @uri')"
          review_url="${ISENGARD_REVIEW_URL%/}/?repo=${encoded_repo}&pr=${PR_NUMBER}&sha=${HEAD_SHA}&run=${GITHUB_RUN_ID}"

          jq -n \
            --arg state pending \
            --arg context isengard/plan-review \
            --arg description "Waiting for Isengard approval before merge." \
            --arg target_url "$review_url" \
            '{state:$state, context:$context, description:$description, target_url:$target_url}' \
            > "$RUNNER_TEMP/isengard-status.json"

          gh api "repos/$GITHUB_REPOSITORY/statuses/$HEAD_SHA" \
            --method POST \
            --input "$RUNNER_TEMP/isengard-status.json"

          cat > "$RUNNER_TEMP/isengard-comment.md" <<MARKDOWN
          $marker
          ## Isengard infrastructure review

          This pull request is blocked until the infrastructure review is approved in Isengard.

          [Open Isengard review]($review_url)

          **Gate:** \`isengard/plan-review\`
          **Commit:** \`$HEAD_SHA\`
          MARKDOWN

          existing_comment_id="$(
            gh api "repos/$GITHUB_REPOSITORY/issues/$PR_NUMBER/comments" --paginate \
              --jq ".[] | select(.body | contains(\"$marker\")) | .id" \
              | tail -n 1
          )"

          jq -n --rawfile body "$RUNNER_TEMP/isengard-comment.md" '{body:$body}' \
            > "$RUNNER_TEMP/isengard-comment.json"

          if [ -n "$existing_comment_id" ]; then
            gh api "repos/$GITHUB_REPOSITORY/issues/comments/$existing_comment_id" \
              --method PATCH \
              --input "$RUNNER_TEMP/isengard-comment.json"
          else
            gh api "repos/$GITHUB_REPOSITORY/issues/$PR_NUMBER/comments" \
              --method POST \
              --input "$RUNNER_TEMP/isengard-comment.json"
          fi

      - name: Enforce Aegis plan-hash approval
        if: github.event_name == 'pull_request'
        run: |
          plan_hash="$(jq -r '.planHash' aegis/report.json)"
          if [ -f aegis/approval.json ] && jq -e --arg hash "$plan_hash" '.decision == "approved" and .planHash == $hash' aegis/approval.json >/dev/null; then
            echo "Aegis approval hash matches current plan. Unblocking merge gate." >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo ""
              echo "## Approval required"
              echo ""
              echo "This PR is intentionally blocked until AegisIaC writes an approval for the current plan hash."
              echo ""
              echo "Current plan hash: \`$plan_hash\`"
              echo ""
              echo "Review the architecture page, then run the approve workflow with PR number \`${{ github.event.pull_request.number }}\`."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

      - name: Upload review artifacts
        uses: actions/upload-artifact@v4
        with:
          name: aegis-plan-review
          path: |
            aegis/plan.redacted.json
            aegis/report.json

  deploy-wall:
    needs: plan-review
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Redact Terraform plan
        run: |
          jq 'del(.. | .before_sensitive?, .after_sensitive?, .sensitive_values?)' aegis/plan.json > aegis/plan.redacted.json
      - name: Generate static report
        run: node aegis/scan.mjs
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
